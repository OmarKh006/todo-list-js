<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link
      rel="shortcut icon"
      href="/todo-list-js/assets/favicon-32x32-DQjEQYWa.png"
      type="image/x-icon"
    />
    <title>Todo list App</title>
    <script type="module" crossorigin src="/todo-list-js/assets/index-B4yX2lq2.js"></script>
    <link rel="stylesheet" crossorigin href="/todo-list-js/assets/index-BT83WGSM.css">
  </head>
  <body>
    <div class="container">
      <div class="main">
        <header class="main__header">
          <h1 class="main--header">TODO</h1>
          <img
            src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='26'%20height='26'%3e%3cpath%20fill='%23FFF'%20fill-rule='evenodd'%20d='M13%200c.81%200%201.603.074%202.373.216C10.593%201.199%207%205.43%207%2010.5%207%2016.299%2011.701%2021%2017.5%2021c2.996%200%205.7-1.255%207.613-3.268C23.22%2022.572%2018.51%2026%2013%2026%205.82%2026%200%2020.18%200%2013S5.82%200%2013%200z'/%3e%3c/svg%3e"
            alt="theme toggle icon"
            class="themeIcon"
            tabindex="0"
            role="button"
            width="26px"
            height="26px"
          />
        </header>
        <div class="inputField">
          <form class="TaskInput">
            <input
              id="search-input"
              class="TaskInput__input"
              type="text"
              placeholder="Create a new todo..."
              required
            />
            <button class="TaskInput__button" type="submit"></button>
          </form>
        </div>
        <div class="TaskList">
          <ul class="TaskList__list"></ul>

          <div class="TaskList__actionButtons">
            <span class="TaskList__notCompleted"
              ><span class="notCompletedValue">5</span> left</span
            >
            <div class="TaskList__navigationButtons">
              <button class="button selectAll --isActive" data-filter="all">
                All
              </button>
              <button class="button selectActive" data-filter="active">
                Active
              </button>
              <button class="button selectCompleted" data-filter="completed">
                Completed
              </button>
            </div>
            <button class="button TaskList__clear" data-filter="clear">
              Clear completed
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
