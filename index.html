<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link
      rel="shortcut icon"
      href="/assets/favicon-32x32.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="style.scss" />
    <title>Todo list App</title>
  </head>
  <body>
    <div class="container">
      <div class="main">
        <header class="main__header">
          <h1 class="main--header">TODO</h1>
          <img
            src="./assets/icon-moon.svg"
            alt="theme toggle icon"
            class="themeIcon"
            tabindex="0"
            role="button"
            width="26px"
            height="26px"
          />
        </header>
        <div class="inputField">
          <form class="TaskInput">
            <input
              id="search-input"
              class="TaskInput__input"
              type="text"
              placeholder="Create a new todo..."
              required
            />
            <button class="TaskInput__button" type="submit"></button>
          </form>
        </div>
        <div class="TaskList">
          <ul class="TaskList__list"></ul>

          <div class="TaskList__actionButtons">
            <span class="TaskList__notCompleted"
              ><span class="notCompletedValue">5</span> left</span
            >
            <div class="TaskList__navigationButtons">
              <button class="button selectAll --isActive">All</button>
              <button class="button selectActive">Active</button>
              <button class="button selectCompleted">Completed</button>
            </div>
            <button class="button TaskList__clear">Clear completed</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
